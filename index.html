<!DOCTYPE html>
<html>
  <head>
   <title>Cadastro de Clientes</title>
  </head>
  <body>
    <h2>Cadastro de Clientes</h2>
    <p>Preencha os dados abaixos:</p>  
    <!--O professor usou teste.jsp apenas para demonstrar o envio.
    Como esta página será publicada no GitHub Pages, usamos #. -->
    <form method="post" action="#">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required> 
      <br>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <br>
      <label for="date-of-birth">Data de Nascimento:</label>  
      <input type="date" id="date-of-birth" name="date-of-birth" required>
      <br> 
      <p>Gênero:</p>
      <select id="sexo" name="sexo" required>
        <option value="masculino">Masculino</option>
        <option value="feminino">Feminino</option>
      </select>
      <br>
      <p>Estado Civil:</p>
      <select id="marital-status" name="marital-status" required>
        <option value="single">Solteiro</option>
        <option value="married">Casado</option>
      </select>
      <br>
      <p>Interesses:</p>
      <input type="checkbox" id="interesse1" name="interesses" value="promoções">
      <label for="interesse1">Promoções</label>
      <br>
      <input type="checkbox" id="interesse2" name="interesses" value="novidades">
      <label for="interesse2">Novidades</label>
      <br>
      <input  type="checkbox" id="interesse3" name="interesses" value="moda e beleza masculina">
      <label for="interesse3">Moda e Beleza Masculina</label>
      <br>
      <input type="checkbox" id="interesse4" name="interesses" value="moda e beleza feminina">
      <label for="interesse4">Moda e Beleza Feminina</label>
      <br>
      <input type="checkbox" id="interesse5" name="interesses" value="cursos">
      <label for="interesse5">Cursos<label>
      <br>
      <br>

      <label for="comentários">Comentários:</label>
      <br>
      <textarea id="comentários" name="comentários" rows="8" cols="30"></textarea>
      <br>
      <br>
      

      <input type="submit" value="Enviar">



     </form>
   </body>
  
   

   



  

</html>
